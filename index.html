<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOGO Trading Platform v1.5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0c0f;color:#e8eaf0;font-size:14px}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#111318;border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:#f0c040;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#0a0c0f}
.logo-name{font-size:15px;font-weight:600}
.logo-sub{font-size:10px;color:#555c6e;letter-spacing:.05em;text-transform:uppercase}
.pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.nav{display:flex;background:#111318;border-bottom:1px solid rgba(255,255,255,0.07);padding:0 24px;gap:2px}
.nav button{padding:11px 16px;background:none;border:none;border-bottom:2px solid transparent;color:#555c6e;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;transition:color .15s}
.nav button:hover{color:#8b91a0}
.nav button.active{color:#f0c040;border-bottom-color:#f0c040}
.page{display:none;padding:20px;min-height:calc(100vh - 105px)}
.page.active{display:block}
.sizer-page{display:none;height:calc(100vh - 105px);overflow:hidden}
.sizer-page.active{display:grid;grid-template-columns:360px 1fr}
.trades-page{display:none;padding:20px;min-height:calc(100vh - 105px);overflow-y:auto}
.trades-page.active{display:block}
.card{background:#111318;border:1px solid rgba(255,255,255,0.07);border-radius:10px;margin-bottom:14px;overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,0.07)}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#8b91a0}
.card-body{padding:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.metric{background:#171b22;border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:11px 13px}
.metric-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#555c6e;margin-bottom:3px}
.metric-value{font-family:\'SF Mono\','Fira Code',monospace;font-size:19px;font-weight:500}
.metric-sub{font-size:10px;color:#555c6e;margin-top:1px;font-family:\'SF Mono\','Fira Code',monospace}
.go-banner{border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:14px;border:1px solid}
.go-banner.go{background:rgba(0,214,143,.08);border-color:rgba(0,214,143,.25)}
.go-banner.warn{background:rgba(255,140,66,.08);border-color:rgba(255,140,66,.3)}
.go-banner.stop{background:rgba(255,69,96,.08);border-color:rgba(255,69,96,.3)}
.go-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:700}
label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#555c6e;margin-bottom:5px}
input,select{width:100%;background:#171b22;border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:8px 11px;font-family:\'SF Mono\','Fira Code',monospace;font-size:13px;color:#e8eaf0;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:#f0c040}
.field{margin-bottom:11px}
.field:last-child{margin-bottom:0}
.btn{padding:8px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid;font-family:inherit;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.82}
.btn-gold{background:#f0c040;color:#0a0c0f;border-color:#f0c040;width:100%;margin-top:4px}
.btn-ghost{background:transparent;border-color:rgba(255,255,255,0.15);color:#8b91a0}
.btn-green{background:rgba(0,214,143,.12);border-color:rgba(0,214,143,.3);color:#00d68f}
.btn-blue{background:rgba(77,166,255,.1);border-color:rgba(77,166,255,.25);color:#4da6ff}
.level-row{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:6px;margin-bottom:4px;border:1px solid}
.level-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.level-label{flex:1;font-size:12px;font-weight:500}
.level-price{font-family:\'SF Mono\','Fira Code',monospace;font-size:13px;font-weight:500}
.level-dist{font-family:\'SF Mono\','Fira Code',monospace;font-size:10px;color:#555c6e;min-width:48px;text-align:right}
.chk-group{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:7px 0 4px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:5px;margin-top:10px}
.chk-group:first-child{margin-top:0}
.chk-item{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:12px;cursor:help}
.chk-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.chk-lbl{flex:1}
.chk-st{font-size:10px;font-weight:700;margin-left:auto}
.sector-row{display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sector-row:last-child{border:none}
.sector-name{width:105px;font-size:12px;color:#8b91a0;flex-shrink:0}
.sector-track{flex:1;height:5px;background:#1e2330;border-radius:3px;overflow:hidden}
.sector-fill{height:100%;border-radius:3px}
.sector-pct{font-family:\'SF Mono\','Fira Code',monospace;font-size:12px;width:42px;text-align:right}
.sector-chg{font-family:\'SF Mono\','Fira Code',monospace;font-size:10px;width:50px;text-align:right}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 11px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#555c6e;border-bottom:1px solid rgba(255,255,255,.07);cursor:pointer;white-space:nowrap;user-select:none}
td{padding:8px 11px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:#171b22;cursor:pointer}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.g{color:#00d68f}.r{color:#ff4560}.o{color:#ff8c42}.b{color:#4da6ff}.gold{color:#f0c040}.dim{color:#555c6e}
.bg-g{background:rgba(0,214,143,.1);border:1px solid rgba(0,214,143,.25)}
.bg-r{background:rgba(255,69,96,.1);border:1px solid rgba(255,69,96,.3)}
.bg-o{background:rgba(255,140,66,.1);border:1px solid rgba(255,140,66,.3)}
.bg-b{background:rgba(77,166,255,.08);border:1px solid rgba(77,166,255,.22)}
.sidebar{border-right:1px solid rgba(255,255,255,.07);overflow-y:auto;padding:14px}
.main-pane{padding:14px}
.roll-row{display:flex;align-items:center;gap:7px;padding:6px 9px;background:#171b22;border-radius:6px;border:1px solid rgba(255,255,255,.07);font-size:11px;margin-bottom:3px}
.pos-row{display:flex;align-items:center;gap:9px;padding:9px 13px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .1s}
.pos-row:hover{background:#171b22}
.pos-row:last-child{border:none}
#api-bar{background:#0e1116;border-bottom:1px solid rgba(255,255,255,.06);padding:5px 24px;font-size:11px;color:#555c6e;font-family:\'SF Mono\','Fira Code',monospace;display:flex;align-items:center;gap:7px}
#api-dot{width:6px;height:6px;border-radius:50%;background:#555c6e;flex-shrink:0;transition:background .3s}
.trade-card{background:#111318;border:1px solid rgba(255,255,255,.07);border-radius:10px;margin-bottom:12px;overflow:hidden}
.trade-card-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.trade-card-body{padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e2330;border-radius:2px}
@keyframes pulse{0%{opacity:.5}100%{opacity:1}}

@media(max-width:768px){.nav{gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}.nav button{font-size:11px;padding:8px 10px;white-space:nowrap;flex-shrink:0}#deploy-btn{display:none}.page{padding:10px}.sizer-page.active{grid-template-columns:1fr!important;overflow-y:auto;height:auto}.sidebar{width:100%!important;border-right:none!important}#screener table{min-width:580px}#screener .card{overflow-x:auto}#an-summary{grid-template-columns:1fr 1fr!important}.trade-card-head{flex-wrap:wrap;gap:6px}}@media(max-width:480px){.nav button{font-size:10px;padding:6px 7px}#an-summary{grid-template-columns:1fr!important}}</style>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'
  import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js'
  import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js'
  const firebaseConfig = {
    apiKey: "AIzaSyC2gl09aCvefp3iWnOFjO8c5UBg-I3aR-A",
    authDomain: "gogo-trading-81293.firebaseapp.com",
    databaseURL: "https://gogo-trading-81293-default-rtdb.firebaseio.com",
    projectId: "gogo-trading-81293",
    storageBucket: "gogo-trading-81293.firebasestorage.app",
    messagingSenderId: "973675032269",
    appId: "1:973675032269:web:8fbd917ba8a670098f4384"
  }
  const app = initializeApp(firebaseConfig)
  const auth = getAuth(app)
  const db = getDatabase(app)
  const provider = new GoogleAuthProvider()
  // Popup first, redirect fallback if blocked
  window.fbSignIn = async () => {
    try {
      await signInWithPopup(auth, provider)
    } catch(e) {
      if(e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
        signInWithRedirect(auth, provider)
      } else { console.warn('Sign-in error:', e.code) }
    }
  }
  window.fbSignOut = () => signOut(auth)
  getRedirectResult(auth).catch(e => { if(e.code !== 'auth/null-user') console.warn('Redirect:', e.code) })
  onAuthStateChanged(auth, user => {
    if(user) {
      window.FBUID = user.uid
      window.FBDB = db
      window.FBRef = ref
      window.FBSet = set
      window.FBGet = get
      window.FBOnValue = onValue
      const signInBtn = document.getElementById('fb-signin-btn')
      const userInfo = document.getElementById('fb-user-info')
      const userName = document.getElementById('fb-user-name')
      const overlay = document.getElementById('mobile-signin-overlay')
      if(signInBtn) signInBtn.style.display = 'none'
      if(userInfo) userInfo.style.display = 'flex'
      if(userName) userName.textContent = user.displayName || user.email || 'Signed in'
      if(overlay) overlay.style.display = 'none'
      if(typeof setApi==='function') typeof setApi==="function"&&setApi('Firebase \u00b7 ' + (user.displayName || user.email || 'connected'), 'ok')
      if(typeof loadFromFirebase === 'function') loadFromFirebase()
      try {
        const pendingRef = ref(db, 'pending_ov')
        onValue(pendingRef, function(snap) {
          try {
            if(!snap || !snap.exists()) return
            const d = snap.val()
            if(!d || !d.ov || !d.importedAt) return
            const lastSavedAt = parseInt(localStorage.getItem('gt_ov_last_savedAt') || '0')
            if(d.savedAt && d.savedAt <= lastSavedAt) return
            localStorage.setItem('gt_ov_last_savedAt', String(d.savedAt || Date.now()))
            const cnt = Object.keys(d.ov).length
            console.log('GOGO: OVTLYR sync \u2014 ' + cnt + ' tickers')
            Object.entries(d.ov).forEach(function(kv){ if(typeof OV !== 'undefined') OV[kv[0]] = kv[1] })
            localStorage.setItem('gt_ov_data', JSON.stringify(d))
            const ovEl = document.getElementById('ov-last-update')
            if(ovEl) ovEl.textContent = 'Last import: ' + new Date(d.importedAt).toLocaleString() + ' (' + cnt + ' tickers)'
            if(typeof runFilter === 'function') runFilter()
            if(typeof setApi === 'function') typeof setApi==="function"&&setApi('OVTLYR synced \u2014 ' + cnt + ' tickers \u2713', 'ok')
            if(typeof fbAutoSave === 'function') fbAutoSave(1000)
            var toast = document.getElementById('ov-sync-toast')
            if(toast) toast.remove()
            toast = document.createElement('div')
            toast.id = 'ov-sync-toast'
            toast.style.cssText = 'position:fixed;bottom:28px;right:28px;z-index:99999;background:#0d1117;border:2px solid #00d68f;border-radius:10px;padding:14px 20px;font-family:monospace;font-size:13px;color:#00d68f;font-weight:700;box-shadow:0 4px 24px rgba(0,0,0,.5);pointer-events:none'
            toast.innerHTML = '\u2705 OVTLYR synced \u2014 ' + cnt + ' tickers<br><span style="font-size:11px;font-weight:400;color:#8b91a0">Screener refreshed</span>'
            document.body.appendChild(toast)
            setTimeout(function(){ toast.style.opacity='0'; setTimeout(function(){ toast.remove() },500) }, 4000)
          } catch(innerErr){ console.warn('OV import error:', innerErr.message) }
        })
      } catch(e) { console.warn('pending_ov listener error:', e.message) }
    } else {
      window.FBUID = null
      const signInBtn = document.getElementById('fb-signin-btn')
      const userInfo = document.getElementById('fb-user-info')
      if(signInBtn) signInBtn.style.display = 'flex'
      if(userInfo) userInfo.style.display = 'none'
    }
  })
</script>
</head>
<body>
  <!-- Mobile sign-in overlay — shows only when not authenticated -->
  <div id="mobile-signin-overlay" style="display:none;position:fixed;inset:0;z-index:999998;background:rgba(10,12,15,.97);flex-direction:column;align-items:center;justify-content:center;gap:20px">
    <div style="color:#f0c040;font-size:22px;font-weight:700;font-family:monospace">GOGO Trading</div>
    <div style="color:#8b91a0;font-size:14px">Sign in to access your platform</div>
    <button onclick="window.fbSignIn ? window.fbSignIn() : setTimeout(()=>window.fbSignIn&&window.fbSignIn(),1500)"
      style="display:flex;align-items:center;gap:10px;background:#fff;color:#333;border:none;border-radius:8px;padding:14px 28px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4);touch-action:manipulation;-webkit-tap-highlight-color:transparent">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
    <div style="color:#555c6e;font-size:11px;text-align:center;max-width:260px">Uses your Google account — same data across all your devices</div>
  </div>
  <script src="app.js?v=6" defer></script>
</body>
</html>
